name: Daily Cash Flow Monitor

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Every weekday (Mon-Fri) at 6:00 AM UTC
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  cash-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Cash Flow Agent
        run: python cashflow_agent.py
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          SENDER_EMAIL:     ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD:  ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL:  ${{ secrets.RECIPIENT_EMAIL }}
          COMPANY_NAME:     ${{ secrets.COMPANY_NAME }}
          CURRENT_BALANCE:  ${{ secrets.CURRENT_BALANCE }}
          ALERT_THRESHOLD:  ${{ secrets.ALERT_THRESHOLD }}
